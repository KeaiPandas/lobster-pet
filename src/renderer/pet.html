<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lobster Pet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 200px;
      height: 200px;
      overflow: hidden;
      background: transparent;
      user-select: none;
      -webkit-app-region: no-drag;
    }

    .lobster-container {
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      position: relative;
    }
    .lobster-container:active { cursor: grabbing; }

    .lobster {
      width: 140px;
      height: 120px;
      position: relative;
      animation: idle-bounce 3s ease-in-out infinite;
      transform-origin: center bottom;
    }

    .lobster.attention {
      animation: attention-wiggle 0.6s ease-in-out;
    }

    .lobster.thinking {
      animation: think-bounce 1s ease-in-out infinite;
    }

    /* Body */
    .body {
      width: 80px;
      height: 60px;
      background: linear-gradient(180deg, #e84040 0%, #c0282a 50%, #a01820 100%);
      border-radius: 50% 50% 45% 45%;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -40%);
      box-shadow:
        inset 0 -8px 16px rgba(0,0,0,0.2),
        inset 0 4px 8px rgba(255,255,255,0.15),
        0 2px 8px rgba(0,0,0,0.3);
    }

    /* Body segments (tail lines) */
    .body::before {
      content: '';
      position: absolute;
      width: 60%;
      height: 4px;
      background: rgba(0,0,0,0.12);
      border-radius: 2px;
      top: 35%;
      left: 20%;
      box-shadow:
        0 10px 0 rgba(0,0,0,0.08),
        0 20px 0 rgba(0,0,0,0.06);
    }

    /* Head */
    .head {
      width: 50px;
      height: 42px;
      background: linear-gradient(180deg, #e84040 0%, #d03030 60%, #b82222 100%);
      border-radius: 50% 50% 40% 40%;
      position: absolute;
      left: 50%;
      top: 12%;
      transform: translate(-50%, 0);
      box-shadow:
        inset 0 -4px 8px rgba(0,0,0,0.15),
        inset 0 2px 4px rgba(255,255,255,0.2),
        0 2px 6px rgba(0,0,0,0.2);
    }

    /* Eyes */
    .eye {
      width: 10px;
      height: 11px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 30%;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);
    }
    .eye.left { left: 20%; }
    .eye.right { right: 20%; }

    .eye::after {
      content: '';
      width: 5px;
      height: 6px;
      background: #1a1a2e;
      border-radius: 50%;
      position: absolute;
      top: 3px;
      left: 3px;
      transition: transform 0.3s ease;
    }

    .eye.left::after { left: 3px; }
    .eye.right::after { right: 3px; left: auto; }

    /* Look towards mouse on attention */
    .attention .eye.left::after { transform: translateX(2px); }
    .attention .eye.right::after { transform: translateX(2px); }

    /* Happy eyes */
    .lobster.talking .eye::after {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      top: 2px;
    }

    /* Mouth */
    .mouth {
      width: 8px;
      height: 4px;
      border-bottom: 2px solid rgba(0,0,0,0.3);
      border-radius: 0 0 4px 4px;
      position: absolute;
      bottom: 25%;
      left: 50%;
      transform: translateX(-50%);
    }

    .lobster.talking .mouth {
      width: 12px;
      height: 8px;
      background: rgba(0,0,0,0.25);
      border: none;
      border-radius: 50%;
      animation: talk 0.3s ease-in-out infinite alternate;
    }

    /* Antennae */
    .antenna {
      width: 3px;
      height: 35px;
      background: linear-gradient(to top, #d03030, #e84040);
      position: absolute;
      top: -20px;
      border-radius: 2px;
      transform-origin: bottom center;
    }
    .antenna.left {
      left: 30%;
      transform: rotate(-25deg);
      animation: antenna-wave-left 4s ease-in-out infinite;
    }
    .antenna.right {
      right: 30%;
      transform: rotate(25deg);
      animation: antenna-wave-right 4s ease-in-out infinite 0.5s;
    }

    .antenna::after {
      content: '';
      width: 6px;
      height: 6px;
      background: #e84040;
      border-radius: 50%;
      position: absolute;
      top: -4px;
      left: -1.5px;
    }

    /* Claws */
    .claw {
      position: absolute;
      top: 35%;
    }
    .claw.left {
      left: -18px;
      animation: claw-idle-left 3s ease-in-out infinite;
    }
    .claw.right {
      right: -18px;
      animation: claw-idle-right 3s ease-in-out infinite 1s;
    }

    .claw-arm {
      width: 20px;
      height: 6px;
      background: linear-gradient(180deg, #e84040, #d03030);
      border-radius: 3px;
      position: relative;
    }

    .claw-pincer {
      position: absolute;
      top: -4px;
      width: 18px;
      height: 14px;
    }

    .claw-pincer .top {
      width: 18px;
      height: 7px;
      background: #e84040;
      border-radius: 8px 8px 2px 2px;
      position: absolute;
      top: 0;
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.2);
    }

    .claw-pincer .bottom {
      width: 16px;
      height: 6px;
      background: #d03030;
      border-radius: 2px 2px 6px 6px;
      position: absolute;
      bottom: 0;
      left: 1px;
    }

    .claw.left .claw-pincer { right: -8px; }
    .claw.right .claw-pincer { left: -8px; }
    .claw.right { transform: scaleX(-1); }

    /* Legs */
    .legs {
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
    }
    .leg {
      width: 3px;
      height: 12px;
      background: #c0282a;
      position: absolute;
      border-radius: 0 0 2px 2px;
    }
    .leg:nth-child(1) { left: 5px; transform: rotate(15deg); }
    .leg:nth-child(2) { left: 18px; transform: rotate(5deg); }
    .leg:nth-child(3) { left: 55px; transform: rotate(-5deg); }
    .leg:nth-child(4) { left: 68px; transform: rotate(-15deg); }

    /* Tail */
    .tail {
      position: absolute;
      bottom: 10%;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 20px;
    }
    .tail-segment {
      width: 16px;
      height: 12px;
      background: linear-gradient(180deg, #c0282a, #a82020);
      border-radius: 50%;
      position: absolute;
      box-shadow: inset 0 -2px 4px rgba(0,0,0,0.15);
    }
    .tail-segment:nth-child(1) { top: 0; left: 0; }
    .tail-segment:nth-child(2) { top: 6px; left: 8px; width: 14px; height: 11px; }
    .tail-segment:nth-child(3) { top: 12px; left: 16px; width: 12px; height: 10px; background: linear-gradient(180deg, #b82222, #981818); }
    .tail-segment:nth-child(4) { top: 16px; left: 22px; width: 10px; height: 9px; background: linear-gradient(180deg, #b02020, #881515); }

    /* Thinking bubble */
    .thinking-bubble {
      position: absolute;
      top: -10px;
      right: -10px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .lobster.thinking .thinking-bubble {
      opacity: 1;
      animation: bubble-pop 1.5s ease-in-out infinite;
    }
    .bubble {
      width: 28px;
      height: 28px;
      background: white;
      border-radius: 50%;
      position: relative;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    .bubble::after {
      content: '';
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      position: absolute;
      bottom: -10px;
      left: 4px;
      box-shadow: -4px 4px 0 4px white;
    }

    /* ========== ANIMATIONS ========== */

    @keyframes idle-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes attention-wiggle {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-5deg); }
      75% { transform: rotate(5deg); }
    }

    @keyframes think-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    @keyframes talk {
      0% { height: 8px; }
      100% { height: 12px; }
    }

    @keyframes antenna-wave-left {
      0%, 100% { transform: rotate(-25deg); }
      50% { transform: rotate(-15deg); }
    }
    @keyframes antenna-wave-right {
      0%, 100% { transform: rotate(25deg); }
      50% { transform: rotate(15deg); }
    }

    @keyframes claw-idle-left {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-8deg); }
    }
    @keyframes claw-idle-right {
      0%, 100% { transform: scaleX(-1) rotate(0deg); }
      50% { transform: scaleX(-1) rotate(-8deg); }
    }

    @keyframes bubble-pop {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    /* Shadow under lobster */
    .shadow {
      width: 70px;
      height: 12px;
      background: rgba(0,0,0,0.12);
      border-radius: 50%;
      position: absolute;
      bottom: 5px;
      left: 50%;
      transform: translateX(-50%);
      animation: shadow-bounce 3s ease-in-out infinite;
      filter: blur(3px);
    }

    @keyframes shadow-bounce {
      0%, 100% { transform: translateX(-50%) scaleX(1); opacity: 0.12; }
      50% { transform: translateX(-50%) scaleX(0.8); opacity: 0.08; }
    }
  </style>
</head>
<body>
  <div class="lobster-container" id="container">
    <div class="lobster" id="lobster">
      <!-- Antennae -->
      <div class="antenna left"></div>
      <div class="antenna right"></div>

      <!-- Head -->
      <div class="head">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="mouth"></div>
      </div>

      <!-- Claws -->
      <div class="claw left">
        <div class="claw-arm">
          <div class="claw-pincer">
            <div class="top"></div>
            <div class="bottom"></div>
          </div>
        </div>
      </div>
      <div class="claw right">
        <div class="claw-arm">
          <div class="claw-pincer">
            <div class="top"></div>
            <div class="bottom"></div>
          </div>
        </div>
      </div>

      <!-- Body -->
      <div class="body"></div>

      <!-- Legs -->
      <div class="legs">
        <div class="leg"></div>
        <div class="leg"></div>
        <div class="leg"></div>
        <div class="leg"></div>
      </div>

      <!-- Tail -->
      <div class="tail">
        <div class="tail-segment"></div>
        <div class="tail-segment"></div>
        <div class="tail-segment"></div>
        <div class="tail-segment"></div>
      </div>

      <!-- Thinking bubble -->
      <div class="thinking-bubble">
        <div class="bubble">💭</div>
      </div>
    </div>

    <!-- Shadow -->
    <div class="shadow"></div>
  </div>

  <script>
    const container = document.getElementById('container');
    const lobster = document.getElementById('lobster');

    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let attentionTimeout = null;
    let idleTimeout = null;

    // Click to open chat
    container.addEventListener('click', (e) => {
      if (!isDragging) {
        window.api.openChat();
      }
    });

    // Drag handling
    container.addEventListener('mousedown', (e) => {
      isDragging = false;
      dragStartX = e.screenX;
      dragStartY = e.screenY;
      window.api.dragStart(e.offsetX, e.offsetY);

      const onMouseMove = (ev) => {
        const dx = ev.screenX - dragStartX;
        const dy = ev.screenY - dragStartY;
        if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
          isDragging = true;
        }
        if (isDragging) {
          window.api.dragMove(ev.screenX, ev.screenY);
        }
      };

      const onMouseUp = () => {
        window.api.dragEnd();
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);
        // Reset drag flag after a tick to avoid triggering click
        setTimeout(() => { isDragging = false; }, 50);
      };

      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    });

    // Attention state on mouse hover
    container.addEventListener('mouseenter', () => {
      lobster.classList.add('attention');
      lobster.classList.remove('talking', 'thinking');
      clearTimeout(idleTimeout);
      clearTimeout(attentionTimeout);
    });

    container.addEventListener('mouseleave', () => {
      attentionTimeout = setTimeout(() => {
        lobster.classList.remove('attention');
      }, 1000);
    });

    // Listen for state changes from chat window
    // For now, expose a global function
    window.setPetState = (state) => {
      lobster.className = 'lobster';
      if (state) lobster.classList.add(state);
    };
  </script>
</body>
</html>
