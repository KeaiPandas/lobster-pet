<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - Lobster Pet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 420px;
      height: 560px;
      overflow: hidden;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
      font-size: 14px;
    }

    .chat-window {
      width: 420px;
      height: 560px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.12),
        0 2px 8px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .chat-header {
      height: 52px;
      background: linear-gradient(135deg, #e84040, #c0282a);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      color: white;
      flex-shrink: 0;
      cursor: default;
      -webkit-app-region: drag;
    }

    .chat-header .title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 15px;
    }

    .chat-header .title .avatar {
      width: 28px;
      height: 28px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .header-actions {
      display: flex;
      gap: 4px;
      -webkit-app-region: no-drag;
    }

    .header-btn {
      width: 28px;
      height: 28px;
      border: none;
      background: rgba(255,255,255,0.15);
      color: white;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: background 0.2s;
    }
    .header-btn:hover { background: rgba(255,255,255,0.25); }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: rgba(248, 248, 248, 0.6);
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 2px; }

    .message {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 16px;
      line-height: 1.5;
      word-wrap: break-word;
      animation: msg-in 0.3s ease;
    }

    @keyframes msg-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      background: linear-gradient(135deg, #e84040, #c0282a);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      align-self: flex-start;
      background: white;
      color: #333;
      border: 1px solid rgba(0,0,0,0.06);
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    .message.assistant pre {
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 10px 12px;
      border-radius: 8px;
      overflow-x: auto;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 13px;
      margin: 6px 0;
    }

    .message.assistant code {
      background: rgba(0,0,0,0.06);
      padding: 1px 5px;
      border-radius: 4px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 13px;
    }

    .message.assistant pre code {
      background: none;
      padding: 0;
    }

    .message .time {
      font-size: 11px;
      opacity: 0.5;
      margin-top: 4px;
    }

    .message.user .time { color: rgba(255,255,255,0.7); }

    /* Typing indicator */
    .typing-indicator {
      align-self: flex-start;
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: white;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .typing-indicator .dot {
      width: 6px;
      height: 6px;
      background: #999;
      border-radius: 50%;
      animation: typing 1.4s infinite;
    }
    .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* Welcome message */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }
    .welcome .emoji { font-size: 40px; margin-bottom: 12px; }
    .welcome .title { font-size: 16px; font-weight: 600; color: #666; margin-bottom: 6px; }
    .welcome .subtitle { font-size: 13px; }

    /* Input area */
    .input-area {
      padding: 12px 16px;
      border-top: 1px solid rgba(0,0,0,0.06);
      background: white;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .input-area textarea {
      flex: 1;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 100px;
      min-height: 40px;
      line-height: 1.5;
      transition: border-color 0.2s;
      background: #fafafa;
    }
    .input-area textarea:focus {
      border-color: #e84040;
      background: white;
    }

    .send-btn {
      width: 40px;
      height: 40px;
      border: none;
      background: linear-gradient(135deg, #e84040, #c0282a);
      color: white;
      border-radius: 12px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .send-btn:hover { transform: scale(1.05); box-shadow: 0 2px 8px rgba(232,64,64,0.4); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Status indicator */
    .status-bar {
      height: 24px;
      padding: 0 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #999;
      background: rgba(248,248,248,0.6);
      border-top: 1px solid rgba(0,0,0,0.04);
      flex-shrink: 0;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4ade80;
    }
    .status-dot.disconnected { background: #f87171; }
    .status-dot.thinking { background: #fbbf24; animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="chat-window">
    <!-- Header -->
    <div class="chat-header">
      <div class="title">
        <div class="avatar">🦞</div>
        <span>Lobster Pet</span>
      </div>
      <div class="header-actions">
        <button class="header-btn" id="minimizeBtn" title="最小化">−</button>
        <button class="header-btn" id="closeBtn" title="关闭">✕</button>
      </div>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages">
      <div class="welcome">
        <div class="emoji">🦞</div>
        <div class="title">Hi! 我是你的小龙虾宠物</div>
        <div class="subtitle">点击下方输入框开始对话吧~</div>
      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <textarea id="input" placeholder="输入消息..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn" title="发送">➤</button>
    </div>

    <!-- Status -->
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">已连接</span>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const closeBtn = document.getElementById('closeBtn');
    const minimizeBtn = document.getElementById('minimizeBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');

    let messages = [];
    let isStreaming = false;
    let config = null;

    // Initialize
    async function init() {
      config = await window.api.getConfig();
      updateStatus('connected');
    }

    function updateStatus(status) {
      statusDot.className = 'status-dot';
      switch (status) {
        case 'connected':
          statusDot.classList.add('');
          statusText.textContent = '已连接';
          break;
        case 'thinking':
          statusDot.classList.add('thinking');
          statusText.textContent = '思考中...';
          break;
        case 'streaming':
          statusDot.classList.add('thinking');
          statusText.textContent = '回复中...';
          break;
        case 'error':
          statusDot.classList.add('disconnected');
          statusText.textContent = '连接失败';
          break;
      }
    }

    function formatTime(ts) {
      const d = new Date(ts);
      return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
    }

    function addMessage(role, content) {
      const msg = {
        id: Date.now().toString() + Math.random().toString(36).slice(2, 6),
        role,
        content,
        timestamp: Date.now()
      };
      messages.push(msg);
      renderMessage(msg);
      scrollToBottom();
      return msg;
    }

    function renderMessage(msg) {
      // Remove welcome if present
      const welcome = messagesEl.querySelector('.welcome');
      if (welcome) welcome.remove();

      // Remove typing indicator
      const typing = messagesEl.querySelector('.typing-indicator');
      if (typing) typing.remove();

      const div = document.createElement('div');
      div.className = `message ${msg.role}`;
      div.id = `msg-${msg.id}`;

      // Simple markdown: code blocks
      let html = escapeHtml(msg.content);
      html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\n/g, '<br>');

      div.innerHTML = `<div class="content">${html}</div><div class="time">${formatTime(msg.timestamp)}</div>`;
      messagesEl.appendChild(div);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showTyping() {
      const typing = document.createElement('div');
      typing.className = 'typing-indicator';
      typing.id = 'typing';
      typing.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
      messagesEl.appendChild(typing);
      scrollToBottom();
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // OpenClaw Gateway integration - streaming
    async function sendMessage(content) {
      if (!content.trim() || isStreaming) return;

      addMessage('user', content);
      inputEl.value = '';
      inputEl.style.height = '40px';

      isStreaming = true;
      sendBtn.disabled = true;

      // Build messages array for API
      const apiMessages = messages.map(m => ({
        role: m.role,
        content: m.content
      }));

      // Set pet state to thinking
      setPetState('thinking');
      updateStatus('thinking');
      showTyping();

      try {
        if (!config || !config.gatewayUrl) throw new Error('未配置 Gateway 地址');

        const url = config.gatewayUrl.replace(/\/$/, '') + '/v1/chat/completions';

        const headers = {
          'Content-Type': 'application/json'
        };
        if (config.gatewayToken) {
          headers['Authorization'] = `Bearer ${config.gatewayToken}`;
        }

        const response = await fetch(url, {
          method: 'POST',
          headers,
          body: JSON.stringify({
            model: config.model || 'openclaw:main',
            messages: apiMessages,
            stream: true
          })
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        // Remove typing indicator
        const typing = document.getElementById('typing');
        if (typing) typing.remove();

        // Set pet state to talking
        setPetState('talking');
        updateStatus('streaming');

        // Create assistant message
        const assistantMsg = addMessage('assistant', '');
        const contentEl = document.getElementById(`msg-${assistantMsg.id}`).querySelector('.content');

        // Stream response
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = line.slice(6).trim();
            if (data === '[DONE]') continue;

            try {
              const parsed = JSON.parse(data);
              const delta = parsed.choices?.[0]?.delta?.content;
              if (delta) {
                assistantMsg.content += delta;
                // Update display
                let html = escapeHtml(assistantMsg.content);
                html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
                html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
                html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                html = html.replace(/\n/g, '<br>');
                contentEl.innerHTML = html;
                scrollToBottom();
              }
            } catch (e) {
              // Ignore parse errors for incomplete chunks
            }
          }
        }

        updateStatus('connected');
      } catch (err) {
        // Remove typing indicator
        const typing = document.getElementById('typing');
        if (typing) typing.remove();

        addMessage('assistant', `⚠️ 连接失败: ${err.message}\n\n请确保 OpenClaw Gateway 正在运行。`);
        updateStatus('error');
      } finally {
        isStreaming = false;
        sendBtn.disabled = false;
        setPetState(null);
        inputEl.focus();
      }
    }

    function setPetState(state) {
      // Try to communicate with pet window (best effort)
      // Since they're separate renderer processes, we use IPC through main
      // For MVP, we'll just update locally. The pet window state sync
      // would need additional IPC setup.
    }

    // Event listeners
    sendBtn.addEventListener('click', () => sendMessage(inputEl.value));

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage(inputEl.value);
      }
    });

    // Auto-resize textarea
    inputEl.addEventListener('input', () => {
      inputEl.style.height = '40px';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
    });

    closeBtn.addEventListener('click', () => window.api.closeChat());
    minimizeBtn.addEventListener('click', () => window.api.closeChat());

    // Initialize
    init();
    inputEl.focus();
  </script>
</body>
</html>
